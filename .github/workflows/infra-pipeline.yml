name: Infrastructure Pipeline

on:
  push:
    branches: [ main, test ]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-pipeline.yml'
  pull_request:
    branches: [ main, test ]
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - production
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      auto_approve:
        description: 'Auto approve Terraform apply'
        required: false
        default: false
        type: boolean

env:
  TERRAFORM_VERSION: '1.6.0'
  AWS_REGION: 'us-east-1'

jobs:
  detect_changes:
    name: Detect Infrastructure Changes
    runs-on: ubuntu-latest
    outputs:
      infra_changed: ${{ steps.changes.outputs.infra }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -E '^infra/'; then
            echo "infra=true" >> $GITHUB_OUTPUT
          else
            echo "infra=false" >> $GITHUB_OUTPUT
          fi

  validate:
    name: Validate Terraform Configuration
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.infra_changed == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        run: |
          cd infra
          terraform fmt -check -recursive

      - name: Terraform Validation (test)
        run: |
          cd infra
          terraform init -backend-config=envs/test/backend.tf
          terraform validate -no-color

      - name: Terraform Validation (prod)
        run: |
          cd infra
          terraform init -backend-config=envs/prod/backend.tf
          terraform validate -no-color


  security_scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [detect_changes, validate]
    if: needs.detect_changes.outputs.infra_changed == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/
          framework: terraform

      - name: Run TFSec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra/
          format: sarif
          soft_fail: true

  deploy:
    name: Terraform Plan/Apply
    runs-on: ubuntu-latest
    needs: [detect_changes, validate, security_scan]
    if: needs.detect_changes.outputs.infra_changed == 'true' || github.event_name == 'workflow_dispatch'
    environment: ${{ inputs.environment || (github.ref == 'refs/heads/main' && 'production') || 'test' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: |
          cd infra
          terraform init -backend-config=envs/${{ inputs.environment || (github.ref == 'refs/heads/main' && 'prod') || 'test' }}/backend.tf

      - name: Terraform Plan/Apply
        run: |
          cd infra
          if [[ "${{ github.event.inputs.action || 'plan' }}" == "apply" ]]; then
            terraform apply -var-file=envs/${{ inputs.environment || (github.ref == 'refs/heads/main' && 'prod') || 'test' }}/${{ inputs.environment || (github.ref == 'refs/heads/main' && 'prod') || 'test' }}.tfvars ${{ github.event.inputs.auto_approve == 'true' && '-auto-approve' || '' }}
          else
            terraform plan -var-file=envs/${{ inputs.environment || (github.ref == 'refs/heads/main' && 'prod') || 'test' }}/${{ inputs.environment || (github.ref == 'refs/heads/main' && 'prod') || 'test' }}.tfvars -out=tfplan
            terraform show -no-color tfplan > plan-output.txt

      - name: Upload Plan
        if: github.event.inputs.action != 'apply'
        uses: actions/upload-artifact@v3
        with:
          name: terraform-plan
          path: infra/tfplan

  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
    environment: ${{ inputs.environment }}-destroy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: |
          cd infra
          terraform init -backend-config=envs/${{ inputs.environment }}/backend.tf

      - name: Terraform Destroy
        run: |
          cd infra
          terraform destroy -var-file=envs/${{ inputs.environment }}/${{ inputs.environment }}.tfvars ${{ inputs.auto_approve && '-auto-approve' || '' }}

  notify:
    name: Notify
    runs-on: ubuntu-latest
    if: always()
    needs: [deploy]
    steps:
      - name: Notify success
        if: needs.deploy.result == 'success'
        run: echo "✅ Deployment completed."

      - name: Notify failure
        if: needs.deploy.result == 'failure'
        run: echo "❌ Deployment failed."
